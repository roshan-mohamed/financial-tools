<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Planner - Debt Crusher</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="logo">
          <i class="fas fa-shield-alt"></i>
          <h1>Debt Crusher</h1>
        </div>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="calculator.html">Debt Calculator</a>
          <a href="budget.html" class="active">Budget Planner</a>
        </nav>
      </div>
    </header>

    <div class="main-content">
      <h2><i class="fas fa-wallet"></i> Monthly Budget Planner</h2>
      <p>Plan your income and expenses to support your debt payoff journey</p>

      <div class="budget-grid">
        <div class="budget-card">
          <h3>Monthly Income</h3>
          <input type="number" id="income" value="4500" oninput="calculateBudget()" style="width:100%; padding:15px; font-size:1.1rem;">
        </div>

        <div class="budget-card">
          <h3>Monthly Expenses</h3>
          <div class="expense-inputs" id="expenseList"></div>
          <button onclick="addNewExpense()" class="add-btn">+ Add Expense</button>
        </div>
      </div>

      <div class="results" id="budgetResults">
        <h3>Budget Summary</h3>
        <div id="summaryContent"></div>
        <canvas id="budgetChart" style="margin-top:25px;"></canvas>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Debt Crusher • Financial Planning Tool</p>
    </footer>
  </div>

  <script src="js/budget.js"></script>
</body>
</html>
